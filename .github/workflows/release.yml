name: release

# Keyless publish to PyPI via OIDC Trusted Publishing.
# Trigger: push a version tag (e.g. v0.9.0). No PyPI API token / secret is used ,
# PyPI exchanges the GitHub OIDC token for a short-lived upload credential and
# records PEP 740 attestations (provenance) automatically. Requires a Trusted
# Publisher to be configured on pypi.org for the `sidereon` project pointing at
# this repo, this workflow file, and the `pypi` environment below.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  preflight:
    name: release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check-release.py --tag "$GITHUB_REF_NAME"

  linux:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: preflight
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI (keyless OIDC + attestations)
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + PEP 740 provenance
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Publish (no token, attestations on)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
