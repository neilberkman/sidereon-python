name: release

# Keyless publish to PyPI via OIDC Trusted Publishing.
# Trigger: push a version tag (e.g. v0.9.0). No PyPI API token / secret is used ,
# PyPI exchanges the GitHub OIDC token for a short-lived upload credential and
# records PEP 740 attestations (provenance) automatically. Requires a Trusted
# Publisher to be configured on pypi.org for the `sidereon` project pointing at
# this repo, this workflow file, and the `pypi` environment below.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  preflight:
    name: release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check-release.py --tag "$GITHUB_REF_NAME"

  linux:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: preflight
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  verify:
    name: installed wheel + source distribution
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Verify third-party notices are packaged
        shell: bash
        run: |
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          test "${#wheels[@]}" -eq 5
          test "${#sdists[@]}" -eq 1
          for wheel in "${wheels[@]}"; do
            notice="$RUNNER_TEMP/$(basename "$wheel").notices"
            unzip -p "$wheel" THIRD-PARTY-NOTICES.md >"$notice"
            grep -F 'Apache License' "$notice" >/dev/null
            grep -F 'Copyright © 2015, Simonas Kazlauskas' "$notice" >/dev/null
            grep -F 'IERS Conventions Software License' "$notice" >/dev/null
            for license in ERFA-BSD-3-Clause.txt \
              IERS-CONVENTIONS-SOFTWARE-LICENSE.txt SciPy-BSD-3-Clause.txt; do
              unzip -p "$wheel" "third_party_licenses/$license" \
                >"$RUNNER_TEMP/$license"
              cmp "$RUNNER_TEMP/$license" "third_party_licenses/$license"
            done
            for source in mod.rs ocean.rs pole.rs; do
              unzip -p "$wheel" \
                "third_party_source/sidereon-core-0.34.0/tides/$source" \
                >"$RUNNER_TEMP/$source"
              cmp "$RUNNER_TEMP/$source" \
                "third_party_source/sidereon-core-0.34.0/tides/$source"
            done
          done
          notice="$RUNNER_TEMP/sdist.notices"
          tar -xOf "${sdists[0]}" --wildcards '*/THIRD-PARTY-NOTICES.md' >"$notice"
          grep -F 'Apache License' "$notice" >/dev/null
          grep -F 'Copyright © 2015, Simonas Kazlauskas' "$notice" >/dev/null
          grep -F 'IERS Conventions Software License' "$notice" >/dev/null
          for license in ERFA-BSD-3-Clause.txt \
            IERS-CONVENTIONS-SOFTWARE-LICENSE.txt SciPy-BSD-3-Clause.txt; do
            tar -xOf "${sdists[0]}" --wildcards \
              "*/third_party_licenses/$license" \
              >"$RUNNER_TEMP/sdist-$license"
            cmp "$RUNNER_TEMP/sdist-$license" "third_party_licenses/$license"
          done
          for source in mod.rs ocean.rs pole.rs; do
            tar -xOf "${sdists[0]}" --wildcards \
              "*/third_party_source/sidereon-core-0.34.0/tides/$source" \
              >"$RUNNER_TEMP/sdist-$source"
            cmp "$RUNNER_TEMP/sdist-$source" \
              "third_party_source/sidereon-core-0.34.0/tides/$source"
          done
      - name: Smoke-test installed x86_64 Linux wheel
        shell: bash
        run: |
          wheels=(dist/*manylinux*x86_64.whl)
          test "${#wheels[@]}" -eq 1
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${wheels[0]}"
          SIDEREON_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" python scripts/smoke-release.py
      - name: Build and smoke-test installed source distribution
        shell: bash
        run: |
          sdists=(dist/*.tar.gz)
          test "${#sdists[@]}" -eq 1
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "${sdists[0]}"
          SIDEREON_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" python scripts/smoke-release.py

  publish:
    name: Publish to PyPI (keyless OIDC + attestations)
    runs-on: ubuntu-latest
    needs: [verify]
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + PEP 740 provenance
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Publish (no token, attestations on)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
