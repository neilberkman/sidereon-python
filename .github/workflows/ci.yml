name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  release-metadata:
    name: release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check-release.py

  rust:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings

  python:
    name: ruff + build + pytest
    # arm64 runner: the bit-exact f64 goldens are captured on aarch64, and
    # transcendental libm differs by a few ULP across architectures.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Determine sidereon-core version
        id: core-version
        shell: bash
        run: |
          version=$(python - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as handle:
              manifest = tomllib.load(handle)

          dep = manifest["dependencies"]["sidereon-core"]
          if isinstance(dep, str):
              version = dep
          else:
              version = dep["version"]

          if any(ch in version for ch in "<>=, "):
              raise SystemExit(f"cannot derive a release tag from version requirement: {version}")

          print(version)
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check out sidereon-core fixtures
        uses: actions/checkout@v4
        with:
          repository: neilberkman/sidereon
          ref: v${{ steps.core-version.outputs.version }}
          path: .core-checkout
      - name: Create venv + install tooling
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip maturin ruff pytest
      - name: ruff check
        run: |
          . .venv/bin/activate
          ruff check .
      - name: ruff format --check
        run: |
          . .venv/bin/activate
          ruff format --check .
      - name: Build the extension (maturin develop)
        run: |
          . .venv/bin/activate
          maturin develop --features exact-cache-test-failpoints
      - name: stub accuracy
        run: |
          . .venv/bin/activate
          pytest tests/test_stub_accuracy.py
      - name: pytest
        env:
          SIDEREON_CORE_FIXTURES: ${{ github.workspace }}/.core-checkout/crates/sidereon-core/tests/fixtures
        run: |
          . .venv/bin/activate
          # The published sidereon-core crate omits test fixtures, so CI checks
          # out the matching release tag and points the test resolver at them.
          pytest
